server.port=18080

spring.datasource.url=jdbc:postgresql://localhost:5432/fx_raptor
spring.datasource.username=fx_user
spring.datasource.password=fx_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.seed.enabled=false
app.valuation.enabled=false

logging.file.name=logs/fx-raptor-demo.log
logging.level.root=INFO
logging.level.com.example.fxraptor=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=${app.logging.sql.level:INFO}
logging.level.org.hibernate.orm.jdbc.bind=${app.logging.sql.bind.level:INFO}

# Set DEBUG / TRACE while investigating SQL and bind parameters.
app.logging.sql.level=INFO
app.logging.sql.bind.level=INFO
